<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>登录助手测试页</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 480px; margin: 48px auto; padding: 0 16px; }
    label { display: block; margin: 12px 0 4px; font-size: 13px; color: #555; }
    input { width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 14px; }
    button { margin-top: 12px; margin-right: 8px; padding: 8px 16px; font-size: 14px; }
    #status { margin-top: 20px; color: #0a7; font-weight: 600; }
    .hint { color: #888; font-size: 12px; line-height: 1.5; }
    hr { margin: 32px 0; border: none; border-top: 1px solid #ddd; }
    .debug { margin-top: 8px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>登录助手测试</h1>
  <p class="hint">主机填 <code>file</code>。密码流账号 <code>demo</code> / <code>pass</code>。</p>
  <p class="hint"><b>短信 + Companion 正确顺序：</b>① 登录助手里把本页配成「账密 + 短信」并拾取验证码框 <code>#otp</code> 与「发送验证码」→ ② 在本页点一键登录（会填账密、点发码、然后等待）→ ③ 手机再推测试码 → 验证码填入的是 <b>验证码栏</b>不是密码栏。</p>

  <h2>密码登录</h2>
  <form id="loginForm" onsubmit="return doLogin(event)">
    <label for="username">用户名</label>
    <input id="username" name="username" type="text" autocomplete="username" />
    <label for="password">密码</label>
    <input id="password" name="password" type="password" autocomplete="current-password" />
    <button type="submit" id="loginBtn">登录</button>
  </form>

  <hr />

  <h2>短信验证码登录</h2>
  <form id="smsForm" onsubmit="return doSmsLogin(event)">
    <label for="smsUser">用户名</label>
    <input id="smsUser" name="smsUser" type="text" autocomplete="username" />
    <label for="smsPass">密码</label>
    <input id="smsPass" name="smsPass" type="password" autocomplete="current-password" />
    <label for="phone">手机号</label>
    <input id="phone" name="phone" type="tel" autocomplete="tel" />
    <button type="button" id="sendCodeBtn" onclick="sendCode()">发送验证码</button>
    <label for="otp">验证码</label>
    <input id="otp" name="otp" type="text" autocomplete="one-time-code" inputmode="numeric" />
    <button type="submit" id="smsLoginBtn">验证并登录</button>
  </form>
  <div class="debug" id="otpDebug"></div>

  <div id="status"></div>
  <script>
    var expectedOtp = '';

    function doLogin(e) {
      e.preventDefault();
      var u = document.getElementById('username').value;
      var p = document.getElementById('password').value;
      var el = document.getElementById('status');
      if (u === 'demo' && p === 'pass') {
        el.style.color = '#0a7';
        el.textContent = '登录成功';
        history.replaceState(null, '', '#ok');
      } else {
        el.textContent = '账号或密码错误（试试 demo / pass）';
        el.style.color = '#c00';
      }
      return false;
    }

    function sendCode() {
      expectedOtp = String(Math.floor(100000 + Math.random() * 900000));
      document.getElementById('otpDebug').textContent =
        '（测试用）当前验证码：' + expectedOtp + ' — 可用 Companion 推送或粘贴此码';
      document.getElementById('status').textContent = '验证码已发送（模拟）';
      document.getElementById('status').style.color = '#0a7';
    }

    function doSmsLogin(e) {
      e.preventDefault();
      var u = document.getElementById('smsUser').value;
      var p = document.getElementById('smsPass').value;
      var otp = document.getElementById('otp').value.trim();
      var el = document.getElementById('status');
      if (u !== 'demo' || p !== 'pass') {
        el.textContent = '账号或密码错误（试试 demo / pass）';
        el.style.color = '#c00';
        return false;
      }
      if (!expectedOtp) {
        el.textContent = '请先点击「发送验证码」';
        el.style.color = '#c00';
        return false;
      }
      if (otp !== expectedOtp) {
        el.textContent = '验证码错误';
        el.style.color = '#c00';
        return false;
      }
      el.style.color = '#0a7';
      el.textContent = '短信登录成功';
      history.replaceState(null, '', '#ok-sms');
      return false;
    }
  </script>
</body>
</html>
